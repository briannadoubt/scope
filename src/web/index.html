<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Scope</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="topbar">
      <button id="breadcrumb-trigger" class="trigger breadcrumb" type="button">
        <span class="brand-mark" aria-hidden="true">◆</span>
        <span id="bc-workspace" class="bc-label">—</span>
        <span class="caret" aria-hidden="true">▼</span>
      </button>
      <button id="view-trigger" class="trigger" type="button" title="View options">
        <span class="t-icon" aria-hidden="true">≡</span>
        <span id="view-label" class="t-label">View</span>
        <span class="caret" aria-hidden="true">▼</span>
      </button>
      <span class="topbar-spacer"></span>
      <label class="switch-field" title="Auto-scroll to ticket on remote moves">
        <span class="switch-label">Auto-scroll</span>
        <span class="switch">
          <input id="autoscroll-toggle" type="checkbox" checked />
          <span class="switch-track" aria-hidden="true"><span class="switch-thumb"></span></span>
        </span>
      </label>
      <span id="live-indicator" class="live-dot" title="Live updates active"></span>
      <button id="search-trigger" class="trigger icon" type="button" title="Search tickets ( / )" aria-label="Search tickets"><svg class="icon-svg" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></button>
      <button id="overflow-trigger" class="trigger icon" type="button" title="More">⋯</button>
      <button id="new-ticket" class="btn primary" type="button">
        <span aria-hidden="true">＋</span><span class="nt-label">&nbsp;New ticket</span>
      </button>
    </header>

    <main id="board" class="board"></main>

    <aside id="drawer" class="drawer" hidden>
      <div class="drawer-inner" id="drawer-content"></div>
    </aside>

    <div id="modal-root"></div>
    <div id="toast-root" aria-live="polite" aria-atomic="true"></div>

    <template id="card-template">
      <article class="card" draggable="true">
        <div class="card-head">
          <span class="badge"></span>
          <span class="card-id"></span>
          <span class="card-pri"></span>
        </div>
        <div class="card-title"></div>
        <div class="card-meta"></div>
      </article>
    </template>

    <script type="module" src="./app.js"></script>
  </body>
</html>
