name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch so a force-push doesn't queue
# multiple stale CI jobs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Lower bound matches package.json "engines.node", upper bound is the
        # latest LTS so we catch regressions early. Node 24 dropped pending
        # SCP-74 (node-forge cert ASN.1 padding mismatch with OpenSSL 3.5).
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Smoke (CLI launches)
        run: |
          node bin/scope.js --version
          node bin/scope.js --help | head -5

      - name: Unit + HTTP tests
        run: npm test

  brew-formula:
    name: Brew formula test
    runs-on: macos-latest
    # The brew test block runs the installed CLI through `init` / `project
    # create` / `--json project list` — guards the Formula against regressions
    # in CLI shape before a release tag goes out.
    steps:
      - uses: actions/checkout@v4

      - name: Install Node 22 (matches Formula pin)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install runtime deps the way the formula does
        run: npm ci --omit=dev --no-audit --no-fund

      - name: Run the formula's test commands locally
        shell: bash
        run: |
          set -euo pipefail
          STAGE="$(mktemp -d)"
          cd "$STAGE"
          node "$GITHUB_WORKSPACE/bin/scope.js" --version
          mkdir -p app && cd app
          node "$GITHUB_WORKSPACE/bin/scope.js" init
          node "$GITHUB_WORKSPACE/bin/scope.js" project create demo DEMO "Demo project"
          OUT="$(node "$GITHUB_WORKSPACE/bin/scope.js" --json project list)"
          echo "$OUT"
          echo "$OUT" | grep -q '"key": "DEMO"'
