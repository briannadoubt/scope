name: Release

# Fires when a `v*.*.*` tag is pushed.
# Flow:
#   1. verify the tag matches package.json
#   2. publish to npm via Trusted Publishing (OIDC — no NPM_TOKEN)
#   3. fetch the GitHub auto-generated source tarball, compute sha256
#   4. patch Formula/scope.rb (url + sha256)
#   5. push the formula into briannadoubt/homebrew-tap
#   6. create a GitHub release with the install snippet
#
# Required repo secrets:
#   HOMEBREW_TAP_DEPLOY_KEY    SSH private key whose pubkey is a write-enabled
#                              deploy key on briannadoubt/homebrew-tap
#
# Required npmjs.com configuration (one-time):
#   Trusted Publisher → GitHub Actions on briannadoubt/scope, workflow
#   release.yml. No token needed; npm trusts our OIDC identity.

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # create GitHub release
      id-token: write     # OIDC for npm Trusted Publishing + provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package.json
        id: meta
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME (=$TAG_VERSION) does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Smoke test
        run: |
          npm ci
          node bin/scope.js --version
          node bin/scope.js --help | head -5

      - name: Publish to npm (Trusted Publishing)
        # No NODE_AUTH_TOKEN — npm reads the OIDC token from GHA.
        # Requires Trusted Publisher to be configured on npmjs.com for this
        # package + this repo + this workflow file.
        run: npm publish --provenance --access public

      - name: Fetch sha256 of GitHub source tarball
        id: sha
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/v${VERSION}.tar.gz"
          # GitHub serves these on-demand once the tag exists — should be instant
          # but a few retries are cheap insurance.
          for i in 1 2 3 4 5 6; do
            if curl -fsSL "$URL" -o /tmp/src.tar.gz; then break; fi
            echo "Tarball not yet available (attempt $i) — retrying in 3s..."
            sleep 3
          done
          if [ ! -s /tmp/src.tar.gz ]; then
            echo "::error::Could not fetch $URL"
            exit 1
          fi
          SHA="$(sha256sum /tmp/src.tar.gz | awk '{print $1}')"
          echo "url=$URL"       >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA"    >> "$GITHUB_OUTPUT"
          echo "sha256: $SHA"

      - name: Patch local Formula/scope.rb
        env:
          URL: ${{ steps.sha.outputs.url }}
          SHA: ${{ steps.sha.outputs.sha256 }}
        run: |
          sed -i -E "s|^( *url +).*|\\1\"$URL\"|" Formula/scope.rb
          sed -i -E "s|^( *sha256 +).*|\\1\"$SHA\"|" Formula/scope.rb
          cat Formula/scope.rb

      - name: Load tap deploy key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}

      - name: Sync formula into briannadoubt/homebrew-tap
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          ssh-keyscan -t rsa,ecdsa,ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
          git clone --depth=1 \
            git@github.com:briannadoubt/homebrew-tap.git tap
          mkdir -p tap/Formula
          cp Formula/scope.rb tap/Formula/scope.rb
          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/scope.rb
          if git diff --cached --quiet; then
            echo "Tap formula already up to date, nothing to push."
          else
            git commit -m "scope v${VERSION}"
            git push origin HEAD:main
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Install

            **Homebrew (macOS / Linuxbrew):**

            ```
            brew install briannadoubt/tap/scope
            brew upgrade scope
            ```

            **npm / npx:**

            ```
            npm install -g scope-kanban
            npx scope-kanban --help
            ```
